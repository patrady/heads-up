name: BradyHeads
options:
  bundleIdPrefix: com.bradyfamily
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  BradyHeads:
    type: application
    platform: iOS
    sources:
      - BradyHeads
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bradyfamily.bradyheads
        PRODUCT_NAME: Brady Heads
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        DEVELOPMENT_TEAM: ""
    info:
      path: BradyHeads/Resources/Info.plist
      properties:
        CFBundleDisplayName: Brady Heads
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMotionUsageDescription: "Brady Heads uses your device's motion sensor to detect when you tilt your head to guess cards — no data is stored or shared."
        UILaunchScreen: {}
    dependencies:
      - sdk: CoreMotion.framework
